<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Valentine Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f0e6;
    --bg-2: #efe9dd;
    --paper: #ffffff;
    --ink: #1a1815;
    --ink-2: #5a554c;
    --ink-3: #8a8478;
    --line: #e3dccd;
    --line-2: #d7cfbc;
    --red: oklch(0.55 0.18 25);
    --red-soft: oklch(0.92 0.05 25);
    --red-deep: oklch(0.42 0.18 25);
    --green: oklch(0.62 0.15 145);
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 18px 40px -22px rgba(20,15,5,0.25);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fbf4e3 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 110%, #f1e6d2 0%, transparent 55%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* very subtle paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: multiply;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(80,60,40,0.06) 1px, transparent 0);
    background-size: 4px 4px;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }

  /* ---------- Envelope / stage ---------- */
  .stage {
    width: min(520px, 100%);
    position: relative;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .meta-row .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); margin-right: 8px; vertical-align: middle;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 36px 32px 28px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .stamp {
    position: absolute;
    top: -10px;
    right: 22px;
    transform: rotate(7deg);
    background: var(--red);
    color: #fff;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 6px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    box-shadow: 0 8px 16px -8px rgba(180,40,30,0.5);
  }

  h1.eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 0 0 14px;
    font-weight: 500;
  }

  .title {
    font-family: "Instrument Serif", "Times New Roman", serif;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
    text-wrap: balance;
  }
  .title em {
    font-style: italic;
    color: var(--red-deep);
  }

  .subtitle {
    color: var(--ink-2);
    font-size: 14.5px;
    line-height: 1.5;
    margin: 0 0 22px;
    text-wrap: pretty;
  }

  /* ---------- reCAPTCHA-style widget ---------- */
  .captcha-widget {
    border: 1px solid #d4d4d4;
    background: #f9f9f9;
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: #555;
    user-select: none;
  }
  .captcha-checkbox {
    width: 26px; height: 26px;
    border: 2px solid #c1c1c1;
    background: #fcfcfc;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 0.15s;
  }
  .captcha-checkbox:hover { border-color: #999; }
  .captcha-checkbox.loading {
    border: 3px solid #c1c1c1;
    border-top-color: #4a90e2;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    cursor: wait;
  }
  .captcha-checkbox.done {
    border-color: #4caf50;
    background: #fff;
  }
  .captcha-checkbox.done::after {
    content: "";
    position: absolute;
    left: 5px; top: 1px;
    width: 8px; height: 14px;
    border: solid #4caf50;
    border-width: 0 3px 3px 0;
    transform: rotate(45deg);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .captcha-label { flex: 1; }
  .captcha-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: #9a9a9a;
    font-size: 8px;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .captcha-brand .logo {
    font-size: 11px;
    font-weight: 600;
    color: #6a6a6a;
    letter-spacing: 0;
    text-transform: none;
    font-family: "Instrument Serif", serif;
    font-style: italic;
  }
  .captcha-brand .heart {
    width: 18px; height: 18px;
    color: var(--red);
  }
  .captcha-brand .terms { font-size: 8px; color: #b0b0b0; }

  /* status messages cycling under the checkbox */
  .status-line {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    margin: -8px 0 18px;
    min-height: 16px;
    padding-left: 4px;
  }
  .status-line .blink::after {
    content: "_";
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- Image grid challenge ---------- */
  .challenge {
    border: 1px solid var(--line-2);
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
    margin-bottom: 18px;
    box-shadow: 0 10px 30px -18px rgba(0,0,0,0.15);
  }
  .challenge-header {
    background: var(--red-deep);
    color: #fff;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.35;
  }
  .challenge-header strong { font-weight: 600; font-size: 16px; display: block; margin-bottom: 2px; }
  .challenge-header .hint { opacity: 0.85; font-size: 12.5px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: #ddd;
    border-bottom: 1px solid var(--line-2);
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: #fff;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .cell:hover { transform: scale(0.98); }
  .cell.selected {
    outline: 3px solid #4a90e2;
    outline-offset: -3px;
  }
  .cell.selected::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(74,144,226,0.12);
    z-index: 2;
  }
  .cell.selected::after {
    content: "✓";
    position: absolute;
    top: 6px; left: 6px;
    width: 20px; height: 20px;
    background: #4a90e2;
    color: #fff;
    display: grid; place-items: center;
    border-radius: 50%;
    font-size: 13px;
    z-index: 3;
  }
  .cell svg { display: block; width: 100%; height: 100%; }
  .cell .caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    padding: 3px 5px;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    z-index: 1;
  }

  .challenge-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #fafafa;
  }
  .icon-btn {
    background: none;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: #777;
    font-size: 14px;
    border-radius: 4px;
  }
  .icon-btn:hover { background: #ececec; color: #222; }

  .verify-btn {
    background: #4a90e2;
    color: #fff;
    border: none;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }
  .verify-btn:hover { background: #3a7fcc; }
  .verify-btn:disabled { background: #b8d2ee; cursor: not-allowed; }

  /* ---------- Slider challenge ---------- */
  .slider-challenge {
    border: 1px solid var(--line-2);
    border-radius: 10px;
    background: #fff;
    padding: 22px 22px 18px;
    margin-bottom: 18px;
  }
  .slider-q {
    font-size: 15px;
    color: var(--ink);
    margin: 0 0 18px;
  }
  .slider-track-wrap {
    position: relative;
    padding: 8px 0 38px;
  }
  .slider-track {
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    position: relative;
    overflow: hidden;
  }
  .slider-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #f3a8a0, var(--red));
    border-radius: 999px;
    pointer-events: none;
    transition: width 0.05s linear;
  }
  .slider-input {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 32px;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    margin: 0;
    cursor: grab;
  }
  .slider-input:active { cursor: grabbing; }
  .slider-input::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--red);
    box-shadow: 0 4px 10px -2px rgba(180,40,30,0.4);
    cursor: grab;
  }
  .slider-input::-moz-range-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--red);
    cursor: grab;
  }
  .slider-labels {
    position: absolute;
    left: 0; right: 0;
    bottom: 6px;
    display: flex;
    justify-content: space-between;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .slider-readout {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--red-deep);
    text-align: center;
    margin-top: 10px;
    min-height: 30px;
    transition: color 0.2s;
  }

  /* ---------- Reveal ---------- */
  .reveal-card {
    text-align: center;
    padding: 56px 32px 40px;
    position: relative;
  }
  .reveal-card .seal {
    width: 64px; height: 64px;
    margin: 0 auto 22px;
    color: var(--red);
    animation: thump 1.4s ease-in-out infinite;
  }
  @keyframes thump {
    0%, 30%, 60%, 100% { transform: scale(1); }
    15%, 45% { transform: scale(1.08); }
  }
  .reveal-eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 0 0 16px;
  }
  .reveal-title {
    font-family: "Instrument Serif", serif;
    font-size: 56px;
    line-height: 1.04;
    margin: 0 0 14px;
    letter-spacing: -0.015em;
  }
  .reveal-title .name {
    color: var(--red-deep);
    font-style: italic;
  }
  .reveal-sub {
    color: var(--ink-2);
    font-size: 15px;
    line-height: 1.5;
    max-width: 360px;
    margin: 0 auto 22px;
  }
  .signature {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    margin-top: 32px;
    padding-top: 18px;
    border-top: 1px dashed var(--line-2);
    display: inline-block;
    min-width: 200px;
  }
  .signature small {
    display: block;
    font-family: "JetBrains Mono", monospace;
    font-style: normal;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* confetti hearts */
  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
  }
  .confetti .h {
    position: absolute;
    color: var(--red);
    opacity: 0;
    animation: fall 4s ease-in forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0.5; }
  }

  /* ---------- Decline button ---------- */
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }
  .decline {
    background: none;
    border: none;
    color: var(--ink-3);
    font-size: 12px;
    cursor: pointer;
    padding: 8px 10px;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: transform 0.35s cubic-bezier(.5,-0.3,.4,1.4);
    font-family: inherit;
  }
  .decline:hover { color: var(--ink-2); }
  .footnote {
    margin-top: 14px;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* error toast */
  .toast {
    background: #fdecec;
    border: 1px solid #f5c2c2;
    color: #8b2020;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    margin-bottom: 14px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .toast .x { font-weight: 600; }

  /* anim entry for cards */
  .fade-in { animation: fadeIn 0.45s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      <rect width="100" height="100" fill={bg}/>
      <ellipse cx="35" cy="40" rx="20" ry="10" fill="#fff" opacity="0.85"/>
      <ellipse cx="65" cy="55" rx="22" ry="11" fill="#fff" opacity="0.85"/>
      <g transform="translate(50 78)"><Heart size={18} fill={fg} style={{transform:"translate(-9px,-9px)"}}/></g>
    </g>,
    // 8: just a really obvious heart
    <g key="i">
      <rect width="100" height="100" fill={bg}/>
      <g transform="translate(50 52)"><Heart size={56} fill={fg} style={{transform:"translate(-28px,-28px)"}}/></g>
    </g>,
  ];
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      {variants[idx % variants.length]}
    </svg>
  );
}

/* ---------------- diagnostic messages ---------------- */
const DIAGNOSTICS = [
  "Analyzing your heart rate…",
  "Cross-referencing with my diary…",
  "Checking for red flags…",
  "Looking for someone better… none found.",
  "Asking your mom for permission…",
  "Verifying you're not my ex…",
  "Re-reading your texts from 2021…",
  "Calculating compatibility (suspiciously high)…",
];

/* ---------------- main app ---------------- */
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const TweaksPanel = window.TweaksPanel;

  // Resolve names — URL params trump tweaks unless tweak is set
  const urlTo = getParam("to", "") || getParam("name", "");
  const urlFrom = getParam("from", "") || getParam("by", "");
  const toName = (tweaks.to || urlTo || "You").trim();
  const fromName = (tweaks.from || urlFrom || "Your Secret Admirer").trim();
  const message = tweaks.message || "";

  // Stages: intro -> imageGrid -> slider -> reveal
  const [stage, setStage] = useState(tweaks.skipToReveal ? "reveal" : "intro");

  useEffect(() => {
    if (tweaks.skipToReveal) setStage("reveal");
  }, [tweaks.skipToReveal]);

  // intro state — checkbox
  const [checkState, setCheckState] = useState("idle"); // idle | loading | done
  const [diagIdx, setDiagIdx] = useState(0);

  useEffect(() => {
    if (checkState !== "loading") return;
    setDiagIdx(0);
    let i = 0;
    const id = setInterval(() => {
      i = (i + 1) % DIAGNOSTICS.length;
      setDiagIdx(i);
    }, 850);
    const done = setTimeout(() => {
      setCheckState("done");
      clearInterval(id);
      setTimeout(() => setStage("grid"), 700);
    }, 3400);
    return () => { clearInterval(id); clearTimeout(done); };
  }, [checkState]);

  // grid challenge state
  const [selected, setSelected] = useState(new Set());
  const [gridError, setGridError] = useState("");
  const [gridAttempts, setGridAttempts] = useState(0);

  const captions = [
    "img_4821.jpg", "screenshot.png", "DSC_0030.jpg",
    "untitled.png", "from_my_camera_roll.jpg", "exhibit_A.png",
    "leftovers.jpg", "very_normal.png", "the_evidence.jpg",
  ];

  function toggleCell(i) {
    setGridError("");
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
  }

  function verifyGrid() {
    // The joke: ALL squares contain a heart, so you need all 9.
    if (selected.size === 9) {
      setStage("slider");
    } else if (selected.size === 0) {
      setGridError("Please select all images containing a heart.");
    } else {
      setGridAttempts(a => a + 1);
      const remaining = 9 - selected.size;
      if (gridAttempts === 0) {
        setGridError(`Almost — you missed ${remaining}. Look closer.`);
      } else if (gridAttempts === 1) {
        setGridError(`Still ${remaining} more. They all have a heart. Trust me, I checked.`);
      } else {
        setGridError(`${remaining} unselected. This is starting to feel personal.`);
      }
    }
  }

  function reloadGrid() {
    setSelected(new Set());
    setGridError("Refreshing didn't help. They're still all hearts.");
  }

  // slider challenge state
  const [sliderVal, setSliderVal] = useState(0);
  const sliderLabel = useMemo(() => {
    if (sliderVal < 10) return "absolutely not";
    if (sliderVal < 30) return "hmm.";
    if (sliderVal < 55) return "i guess.";
    if (sliderVal < 80) return "fine, yes.";
    if (sliderVal < 99) return "yes, obviously.";
    return "yes, a thousand times.";
  }, [sliderVal]);

  function confirmSlider() {
    if (sliderVal >= 100) setStage("reveal");
  }

  // decline button skitter
  const declineRef = useRef(null);
  const [declineDx, setDeclineDx] = useState(0);
  const [declineDodges, setDeclineDodges] = useState(0);
  const [declineGone, setDeclineGone] = useState(false);

  function dodgeDecline() {
    if (declineDodges >= 2) {
      setDeclineGone(true);
      return;
    }
    setDeclineDx(prev => (prev === 0 ? -120 : prev > 0 ? -160 : 160));
    setDeclineDodges(d => d + 1);
  }

  // confetti for reveal
  const [confetti, setConfetti] = useState([]);
  useEffect(() => {
    if (stage !== "reveal") return;
    const pieces = Array.from({length: 30}, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      delay: Math.random() * 2.5,
      size: 14 + Math.random() * 22,
      tilt: Math.random() * 360,
    }));
    setConfetti(pieces);
  }, [stage]);

  /* -------- renders -------- */
  const stageLabel = stage === "intro" ? "01 / VERIFICATION"
    : stage === "grid" ? "02 / IMAGE CHALLENGE"
    : stage === "slider" ? "03 / FINAL CONFIRMATION"
    : "04 / VERIFIED";

  return (
    <div className="stage">
      <div className="meta-row">
        <span><span className="dot"></span>SECURE TRANSMISSION</span>
        <span>{stageLabel}</span>
      </div>

      {stage === "intro" && (
        <div className="card fade-in" key="intro">
          <div className="stamp">Priority · 1ST class</div>
          <h1 className="eyebrow">Hand-Delivered To</h1>
          <h2 className="title">{toName},<br/>you've received <em>a Valentine.</em></h2>
          <p className="subtitle">
            For security reasons, please verify you are a real human{toName !== "You" ? ` and that you are, in fact, ${toName}` : ""}. Bots have been receiving entirely too many valentines this year.
          </p>

          <div className="captcha-widget">
            <div
              className={"captcha-checkbox " + (checkState === "loading" ? "loading" : checkState === "done" ? "done" : "")}
              onClick={() => { if (checkState === "idle") setCheckState("loading"); }}
              role="checkbox"
              aria-checked={checkState === "done"}
              tabIndex={0}
            />
            <div className="captcha-label">
              {checkState === "done" ? "Verified. You seem human enough." : "I'm not a robot"}
            </div>
            <div className="captcha-brand">
              <Heart size={18} />
              <span className="logo">cuteCAPTCHA</span>
              <span className="terms">Privacy · Terms</span>
            </div>
          </div>

          <div className="status-line">
            {checkState === "loading" && (<><span className="blink">{DIAGNOSTICS[diagIdx]}</span></>)}
            {checkState === "done" && <>✓ pass. preparing challenge…</>}
            {checkState === "idle" && <span style={{opacity:0.7}}>tip: click the box. it's the box.</span>}
          </div>

          <div className="actions">
            <span className="footnote">From {fromName}</span>
            {!declineGone ? (
              <button
                ref={declineRef}
                className="decline"
                style={{ transform: `translateX(${declineDx}px)` }}
                onMouseEnter={dodgeDecline}
                onFocus={dodgeDecline}
                onClick={(e)=>{ e.preventDefault(); dodgeDecline(); }}
              >
                {declineDodges === 0 ? "decline" : declineDodges === 1 ? "no really, decline" : "fine, decline"}
              </button>
            ) : (
              <span className="footnote" style={{opacity:0.6}}>decline button quit</span>
            )}
          </div>
        </div>
      )}

      {stage === "grid" && (
        <div className="card fade-in" key="grid" style={{padding:"24px 22px 22px"}}>
          {gridError && (
            <div className="toast"><span className="x">✕</span><span>{gridError}</span></div>
          )}
          <div className="challenge">
            <div className="challenge-header">
              <strong>Select all squares with</strong>
              <span className="hint">a <Heart size={12} fill="#fff" style={{display:"inline",verticalAlign:"-2px",marginRight:2}}/> heart. If there are none, click verify.</span>
            </div>
            <div className="grid">
              {captions.map((c, i) => (
                <div
                  key={i}
                  className={"cell " + (selected.has(i) ? "selected" : "")}
                  onClick={() => toggleCell(i)}
                >
                  <CellArt idx={i} />
                </div>
              ))}
            </div>
            <div className="challenge-foot">
              <div style={{display:"flex",gap:4}}>
                <button className="icon-btn" onClick={reloadGrid} title="Get a new challenge">↻</button>
                <button className="icon-btn" title="Audio challenge (unavailable)" onClick={()=>setGridError("Audio challenge unavailable. Use your eyes.")}>♪</button>
                <button className="icon-btn" title="Help" onClick={()=>setGridError("Hint: every single one is a heart.")}>?</button>
              </div>
              <button className="verify-btn" onClick={verifyGrid}>VERIFY</button>
            </div>
          </div>
          <p className="subtitle" style={{margin:0, fontSize:12.5, color:"var(--ink-3)", textAlign:"center"}}>
            This step protects against bots <em>and</em> people with worse taste.
          </p>
        </div>
      )}

      {stage === "slider" && (
        <div className="card fade-in" key="slider">
          <h1 className="eyebrow">Final Confirmation</h1>
          <h2 className="title" style={{fontSize:36, marginBottom:18}}>
            On a scale of <em>0 to yes</em>,<br/>
            will you be {fromName !== "Your Secret Admirer" ? <>{fromName}'s</> : "my"} valentine?
          </h2>

          <div className="slider-challenge">
            <div className="slider-track-wrap">
              <div className="slider-track">
                <div className="slider-fill" style={{width: `${sliderVal}%`}}></div>
              </div>
              <input
                type="range" min="0" max="100" value={sliderVal}
                className="slider-input"
                onChange={e => setSliderVal(parseInt(e.target.value, 10))}
              />
              <div className="slider-labels">
                <span>NO</span><span>MEH</span><span>OK</span><span>SURE</span><span>YES</span>
              </div>
            </div>
            <div className="slider-readout">"{sliderLabel}"</div>
          </div>

          <div className="actions">
            <button
              className="decline"
              onClick={() => setSliderVal(s => Math.max(0, s - 25))}
              style={{textDecoration:"none"}}
            >← reconsider</button>
            <button
              className="verify-btn"
              onClick={confirmSlider}
              disabled={sliderVal < 100}
              style={{background: sliderVal >= 100 ? "var(--red)" : undefined}}
            >
              {sliderVal < 100 ? `slide all the way (${sliderVal}%)` : "CONFIRM ✓"}
            </button>
          </div>
        </div>
      )}

      {stage === "reveal" && (
        <>
          <div className="confetti">
            {confetti.map(p => (
              <div key={p.id} className="h" style={{
                left: `${p.left}%`,
                animationDelay: `${p.delay}s`,
                transform: `rotate(${p.tilt}deg)`,
              }}>
                <Heart size={p.size} />
              </div>
            ))}
          </div>
          <div className="card reveal-card fade-in" key="reveal">
            <div className="seal"><Heart size={64} /></div>
            <p className="reveal-eyebrow">Verified · Authentic · Non-refundable</p>
            <h2 className="reveal-title">
              <span className="name">{toName}</span>,<br/>
              you are my valentine.
            </h2>
            <p className="reveal-sub">
              {message
                ? message
                : <>The system has spoken. The captcha agrees. There is no appeals process.</>}
            </p>
            <div className="signature">
              {fromName}
              <small>— sender · {new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"})}</small>
            </div>

            <div style={{marginTop:24}}>
              <button
                className="decline"
                onClick={() => { setStage("intro"); setCheckState("idle"); setSelected(new Set()); setSliderVal(0); setDeclineGone(false); setDeclineDodges(0); setDeclineDx(0); }}
              >start over (you'll just end up here again)</button>
            </div>
          </div>
        </>
      )}

      {/* Tweaks panel */}
      {TweaksPanel && (
        <TweaksPanel title="Tweaks">
          {window.TweakSection && (
            <>
              <window.TweakSection label="Names" />
              <window.TweakText label="To" value={tweaks.to} placeholder={urlTo || "(from URL: ?to=)"} onChange={v => setTweak("to", v)} />
              <window.TweakText label="From" value={tweaks.from} placeholder={urlFrom || "(from URL: ?from=)"} onChange={v => setTweak("from", v)} />
              <window.TweakSection label="Reveal" />
              <window.TweakText label="Custom message" value={tweaks.message} placeholder="optional override" onChange={v => setTweak("message", v)} />
              <window.TweakToggle label="Skip to reveal" value={tweaks.skipToReveal} onChange={v => setTweak("skipToReveal", v)} />
              <window.TweakSection label="URL" />
                <div style={{fontFamily:"JetBrains Mono, monospace", fontSize:10.5, color:"#888", lineHeight:1.6, wordBreak:"break-all"}}>
                  ?to={encodeURIComponent(toName)}&from={encodeURIComponent(fromName)}
                </div>
                <window.TweakButton label="Copy share URL" onClick={() => {
                  const u = new URL(window.location.href);
                  u.searchParams.set("to", toName);
                  u.searchParams.set("from", fromName);
                  navigator.clipboard?.writeText(u.toString());
                }} />
            </>
          )}
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
